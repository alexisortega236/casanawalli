name: Deploy to SiteGround

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: |
          composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction
          npm ci

      - name: Build assets
        run: npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SITEGROUND_SSH_KEY }}" > ~/.ssh/siteground
          chmod 600 ~/.ssh/siteground
          ssh-keyscan -p "${{ secrets.SITEGROUND_PORT }}" "${{ secrets.SITEGROUND_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy files
        run: |
          rsync -az --delete \
            --exclude=".git" \
            --exclude=".env" \
            --exclude="node_modules" \
            --exclude="storage/app/public" \
            -e "ssh -i ~/.ssh/siteground -p ${{ secrets.SITEGROUND_PORT }}" \
            ./ "${{ secrets.SITEGROUND_USER }}@${{ secrets.SITEGROUND_HOST }}:${{ secrets.SITEGROUND_PATH }}"

      - name: Optimize Laravel
        run: |
          ssh -i ~/.ssh/siteground -p "${{ secrets.SITEGROUND_PORT }}" "${{ secrets.SITEGROUND_USER }}@${{ secrets.SITEGROUND_HOST }}" \
            "cd '${{ secrets.SITEGROUND_PATH }}' && php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache"
